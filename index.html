<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>PK AUSA</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#f0f2f5; color:#1a1a2e; height:100dvh; display:flex; flex-direction:column; overflow:hidden; }

    #header { background:#0d1526; padding:0 16px; height:48px; display:flex; align-items:center; justify-content:space-between; z-index:1000; flex-shrink:0; box-shadow:0 2px 8px rgba(0,0,0,0.4); }
    #header-logo svg { height:22px; }
    #header-title { font-size:13px; font-weight:600; color:#f0a500; letter-spacing:0.08em; text-transform:uppercase; }

    #map { flex:1; width:100%; position:relative; }

    #zoom-indicator { position:absolute; top:10px; left:10px; z-index:999; background:rgba(255,255,255,0.85); border-radius:6px; padding:3px 8px; font-size:11px; color:#666; pointer-events:none; }

    #gps-btn { position:absolute; bottom:180px; right:14px; z-index:1000; width:48px; height:48px; border-radius:50%; background:#fff; border:none; color:#0066ff; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 12px rgba(0,0,0,0.25); -webkit-tap-highlight-color:transparent; transition:transform 0.1s; }
    #gps-btn:active { transform:scale(0.92); }
    #gps-btn.locating { animation:pulse 1s infinite; }
    @keyframes pulse { 0%,100%{box-shadow:0 2px 12px rgba(0,0,0,0.25)} 50%{box-shadow:0 2px 20px rgba(0,102,255,0.5)} }

    #popup-panel { position:absolute; bottom:0; left:0; right:0; z-index:1000; background:#fff; border-top:1px solid #e0e0e0; border-radius:20px 20px 0 0; padding:0 20px 36px; transform:translateY(100%); transition:transform 0.3s cubic-bezier(0.4,0,0.2,1); box-shadow:0 -4px 24px rgba(0,0,0,0.12); }
    #popup-panel.visible { transform:translateY(0); }
    #popup-handle { width:36px; height:4px; background:#e0e0e0; border-radius:2px; margin:12px auto 16px; }
    #popup-close { position:absolute; top:14px; right:18px; background:none; border:none; color:#999; font-size:24px; cursor:pointer; padding:4px; line-height:1; -webkit-tap-highlight-color:transparent; }
    #pk-value { font-size:38px; font-weight:800; color:#0066ff; letter-spacing:0.02em; margin-bottom:2px; }
    #pk-label { font-size:11px; text-transform:uppercase; letter-spacing:0.12em; color:#999; margin-bottom:16px; }
    .info-row { display:flex; align-items:flex-start; gap:12px; padding:10px 0; border-bottom:1px solid #f0f0f0; }
    .info-row:last-child { border-bottom:none; }
    .info-icon { font-size:18px; width:26px; flex-shrink:0; margin-top:1px; }
    .info-label { font-size:10px; text-transform:uppercase; letter-spacing:0.1em; color:#999; margin-bottom:2px; }
    .info-value { font-size:15px; font-weight:600; color:#1a1a2e; }

    #status { position:absolute; top:12px; left:50%; transform:translateX(-50%); z-index:999; background:rgba(0,0,0,0.7); border-radius:20px; padding:6px 14px; font-size:12px; color:#fff; white-space:nowrap; pointer-events:none; opacity:0; transition:opacity 0.3s; }
    #status.visible { opacity:1; }

    .leaflet-popup { display:none !important; }
    .leaflet-control-zoom { border:none !important; box-shadow:0 2px 8px rgba(0,0,0,0.15) !important; }
    .leaflet-control-zoom a { background:#fff !important; color:#0066ff !important; border:none !important; border-radius:8px !important; width:36px !important; height:36px !important; line-height:36px !important; font-size:18px !important; margin-bottom:2px !important; }
  </style>
</head>

// Rangos exclusivos
const SCALE_CONFIG = {
  1: { minZoom:1,  maxZoom:13, iconFn: makeCircleSmall },
  2: { minZoom:13, maxZoom:15, iconFn: makeCircleMed   },
  3: { minZoom:15, maxZoom:16, iconFn: makeCircleMed   },
  4: { minZoom:16, maxZoom:17, iconFn: makeLollipopSm  },
  5: { minZoom:17, maxZoom:22, iconFn: makeLollipopLg  }
};

const byScale = {1:[],2:[],3:[],4:[],5:[]};
PK_DATA.forEach(p => { if(byScale[p.escala]) byScale[p.escala].push(p); });

let selectedMarker = null;
let selectedScale = null;

const layers = {};
Object.keys(byScale).forEach(s => {
  const cfg = SCALE_CONFIG[s];
  const group = L.layerGroup();
  byScale[s].forEach(p => {
    const m = L.marker([p.lat, p.lng], { icon: cfg.iconFn() });
    m.on('click', e => {
      L.DomEvent.stopPropagation(e);
      if(selectedMarker && selectedMarker !== m) {
        selectedMarker.setIcon(SCALE_CONFIG[selectedScale].iconFn());
      }
      selectedMarker = m;
      selectedScale = s;
      m.setIcon(makeLollipopSelected());
      showPanel(p);
    });
    group.addLayer(m);
  });
  layers[s] = { group, cfg };
});

const zoomEl = document.getElementById('zoom-indicator');
function updateLayers() {
  const z = map.getZoom();
  zoomEl.textContent = 'Zoom: ' + z;
  Object.keys(layers).forEach(s => {
    const { group, cfg } = layers[s];
    const show = z >= cfg.minZoom && z < cfg.maxZoom;
    if(show && !map.hasLayer(group)) map.addLayer(group);
    if(!show && map.hasLayer(group)) map.removeLayer(group);
  });
}
map.on('zoomend', () => { updateLayers(); closePanel(); });
updateLayers();

// Panel
const panel = document.getElementById('popup-panel');
function closePanel() {
  panel.classList.remove('visible');
  if(selectedMarker) { selectedMarker.setIcon(SCALE_CONFIG[selectedScale].iconFn()); selectedMarker=null; }
}
document.getElementById('popup-close').onclick = closePanel;
map.on('click', closePanel);

function showPanel(p) {
  document.getElementById('pk-value').textContent = p.pk;
  document.getElementById('info-tramo').textContent = p.tramo;
  panel.classList.add('visible');
}

// GPS
const statusEl = document.getElementById('status');
let statusTimer;
function showStatus(msg, dur=2500) {
  statusEl.textContent = msg; statusEl.classList.add('visible');
  clearTimeout(statusTimer);
  if(dur>0) statusTimer = setTimeout(()=>statusEl.classList.remove('visible'), dur);
}

let locMarker, locCircle;
document.getElementById('gps-btn').addEventListener('click', function() {
  this.classList.add('locating');
  showStatus('Buscando ubicación...', 0);
  navigator.geolocation.getCurrentPosition(pos => {
    const {latitude:lat, longitude:lng, accuracy} = pos.coords;
    if(locMarker) map.removeLayer(locMarker);
    if(locCircle) map.removeLayer(locCircle);
    locCircle = L.circle([lat,lng],{radius:accuracy,color:BLUE,fillColor:BLUE,fillOpacity:0.1,weight:1}).addTo(map);
    locMarker = L.circleMarker([lat,lng],{radius:9,color:'#fff',fillColor:BLUE,fillOpacity:1,weight:3}).addTo(map);
    map.flyTo([lat,lng], 17, { animate:true, duration:1.8, easeLinearity:0.25 });
    this.classList.remove('locating');
    statusEl.classList.remove('visible');
  }, () => {
    this.classList.remove('locating');
    showStatus('No se pudo obtener la ubicación', 3000);
  }, {enableHighAccuracy:true, timeout:10000});
});
</script>
